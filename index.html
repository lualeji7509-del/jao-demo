<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>JAO Proyectos · Demo guiada por Jarvis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1C2B3A; --navy-2:#243447; --navy-3:#2E4057;
  --gold:#B8952A; --gold-2:#d9b24e; --gold-soft:#FBF6E9;
  --azul:#2563EB; --azul-soft:#EFF6FF;
  --rojo:#D94040; --rojo-soft:#FDEAEA;
  --wa:#25D366; --verde-ok:#1f9d57;
  --g-borde:#E8EBEF; --g-fondo:#F4F6F8; --g:#6B7785; --g-med:#374151; --g-osc:#15202B;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'DM Sans',-apple-system,sans-serif}
html,body{height:100%}
body{background:#0a131c;color:#fff;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:100dvh;position:relative}
#amb{position:fixed;inset:0;z-index:0;background:radial-gradient(70% 50% at 50% -8%,#39597a 0%,#1C2B3A 42%,#0a131c 78%);overflow:hidden}
#amb::before,#amb::after{content:"";position:absolute;border-radius:50%;filter:blur(70px);opacity:.5}
#amb::before{width:420px;height:420px;left:-120px;top:8%;background:radial-gradient(circle,#3a6ea5,transparent 70%);animation:float1 14s ease-in-out infinite}
#amb::after{width:360px;height:360px;right:-110px;bottom:6%;background:radial-gradient(circle,#b8952a55,transparent 70%);animation:float2 17s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,-26px)}}
#stage{position:relative;z-index:1;width:100%;max-width:430px;height:100dvh;max-height:920px;display:flex;flex-direction:column;padding:14px 14px 12px}

/* Jarvis bar */
.jbar{display:flex;align-items:center;gap:11px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.10);border-radius:20px;padding:10px 12px;backdrop-filter:blur(8px);min-height:74px;box-shadow:0 6px 24px rgba(0,0,0,.25)}
.javatar{width:50px;height:50px;flex:0 0 50px;border-radius:50%;background:linear-gradient(150deg,var(--gold) 0%,#e7c976 60%,#fff5d6 100%);display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 16px rgba(184,149,42,.4);transition:box-shadow .4s}
.javatar.talk{animation:breathe 1.7s ease-in-out infinite;box-shadow:0 0 0 4px rgba(184,149,42,.25),0 6px 22px rgba(184,149,42,.6)}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.jmeta{flex:1;min-width:0}
.jname{font-weight:800;font-size:14px;letter-spacing:.2px}
.jname b{color:var(--gold-2)}
.jstate{font-size:11.5px;color:#9fb4c6;display:flex;align-items:center;gap:6px;margin-top:1px}
.wave{display:flex;gap:3px;align-items:flex-end;height:13px}
.wave span{width:3px;height:5px;background:var(--gold-2);border-radius:2px;opacity:.45}
.wave.on span{animation:wv .9s ease-in-out infinite}
.wave.on span:nth-child(2){animation-delay:.12s}.wave.on span:nth-child(3){animation-delay:.24s}.wave.on span:nth-child(4){animation-delay:.36s}.wave.on span:nth-child(5){animation-delay:.48s}
@keyframes wv{0%,100%{height:4px}50%{height:13px}}
.jmute{flex:0 0 auto;width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.05);color:#cfe0ee;font-size:16px;cursor:pointer}

.bubble{margin:11px 2px 0;background:#fff;color:var(--navy);border-radius:17px 17px 17px 5px;padding:13px 16px;font-size:14.5px;line-height:1.52;font-weight:500;min-height:30px;box-shadow:0 12px 34px rgba(0,0,0,.28);animation:bub .35s ease}
@keyframes bub{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.bubble.empty{opacity:0;height:0;min-height:0;padding:0;margin:0;overflow:hidden}
.bubble .adv{display:inline-block;margin-top:8px;background:var(--gold-soft);color:#7a611a;border:1px solid #ecd9a0;border-radius:9px;padding:5px 10px;font-size:12.5px;font-weight:700}

.phonewrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;margin-top:9px}
.phone{width:100%;max-width:332px;height:100%;max-height:640px;background:#0c1620;border-radius:42px;border:10px solid #060c12;box-shadow:0 30px 70px rgba(0,0,0,.6),inset 0 0 0 2px #20303f;overflow:hidden;position:relative;display:flex;flex-direction:column}
.statusbar{flex:0 0 auto;height:30px;background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 18px;position:relative}
.statusbar .t{font-size:12px;font-weight:700;color:#fff;letter-spacing:.3px}
.statusbar .ic{font-size:11px;color:#fff;letter-spacing:2px}
.island{position:absolute;left:50%;top:7px;transform:translateX(-50%);width:78px;height:17px;background:#000;border-radius:11px}
.scr{flex:1;overflow:hidden;position:relative;background:var(--g-fondo);display:flex;flex-direction:column}
.scr.navy{background:radial-gradient(120% 72% at 50% 0,#2c4660 0,#1C2B3A 58%,#142433 100%)}
.fade{animation:fade .5s cubic-bezier(.22,.61,.36,1)}
@keyframes fade{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}

.appbar{background:var(--navy);color:#fff;padding:11px 14px 12px;display:flex;align-items:center;gap:9px;flex:0 0 auto}
.logo-img{height:30px;width:auto;border-radius:7px;display:block;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.appbar .t{font-weight:800;font-size:14.5px;line-height:1.1}
.appbar .s{font-size:10px;color:#9fb4c6}
.rolechip{margin-left:auto;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;background:rgba(184,149,42,.2);color:#e7c976;border:1px solid rgba(184,149,42,.42);padding:3px 9px;border-radius:999px}
.body{flex:1;overflow-y:auto;padding:13px;color:var(--g-osc)}
.nav{flex:0 0 auto;background:#fff;border-top:1px solid var(--g-borde);display:flex;justify-content:space-around;padding:7px 4px 10px}
.nav div{font-size:9.5px;color:var(--g);display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:600}
.nav div b{font-size:18px;font-weight:400}
.nav div.act{color:var(--navy)}

.card{background:#fff;border:1px solid var(--g-borde);border-radius:16px;padding:13px;margin-bottom:11px;box-shadow:0 1px 2px rgba(20,30,45,.04)}
.h{font-weight:800;color:var(--navy);font-size:15px}
.sub{color:var(--g);font-size:12px}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.btn{background:var(--navy);color:#fff;border:none;border-radius:13px;padding:13px;font-weight:800;font-size:14px;width:100%;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 16px rgba(28,43,58,.22)}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-2));box-shadow:0 6px 16px rgba(184,149,42,.34)}
.btn.green{background:var(--verde-ok);box-shadow:0 6px 16px rgba(31,157,87,.28)}
.btn.ghost{background:#fff;color:var(--navy);border:1.5px solid var(--g-borde);box-shadow:none}
.pill{display:inline-flex;align-items:center;gap:5px;background:var(--g-fondo);border:1px solid var(--g-borde);border-radius:999px;padding:6px 11px;font-size:12px;font-weight:700;color:var(--g-med)}
.pill.gold{background:var(--gold-soft);border-color:#ecd9a0;color:#7a611a}
.pill.ok{background:#e9f7ef;border-color:#bfe6cf;color:#1f7a48}
.pill.red{background:var(--rojo-soft);border-color:#f2c2c2;color:#b53030}
.pill.blue{background:var(--azul-soft);border-color:#cfe0fb;color:#1e4fc4}
.tag{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--gold)}
.line{height:1px;background:var(--g-borde);margin:9px 0}
.hot.armed{outline:3px solid var(--gold);outline-offset:3px;border-radius:14px;animation:pulse 1.2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(184,149,42,.5)}70%{box-shadow:0 0 0 14px rgba(184,149,42,0)}100%{box-shadow:0 0 0 0 rgba(184,149,42,0)}}
.taphint{position:absolute;z-index:6;background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#fff;font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;box-shadow:0 6px 18px rgba(0,0,0,.35);pointer-events:none;white-space:nowrap;animation:bob 1s ease-in-out infinite;top:-13px;right:6px}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

.ctrls{display:flex;align-items:center;gap:11px;margin-top:11px}
.pwrap{flex:1;min-width:0}
.plabel{display:flex;justify-content:space-between;font-size:10.5px;font-weight:700;color:#9fb4c6;margin-bottom:5px;letter-spacing:.3px}
.plabel b{color:var(--gold-2);text-transform:uppercase;letter-spacing:.6px}
.pbar{height:5px;background:rgba(255,255,255,.13);border-radius:4px;overflow:hidden}
.pbar i{display:block;height:100%;width:5%;background:linear-gradient(90deg,var(--gold),var(--gold-2));border-radius:4px;transition:width .5s cubic-bezier(.22,.61,.36,1)}
.next{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#fff;border:none;border-radius:13px;padding:11px 17px;font-weight:800;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 8px 22px rgba(184,149,42,.4);white-space:nowrap}
.restart{background:rgba(255,255,255,.05);color:#9fb4c6;border:1px solid rgba(255,255,255,.16);border-radius:11px;padding:10px 12px;font-weight:700;font-size:14px;cursor:pointer}

#intro{position:absolute;inset:0;z-index:30;background:radial-gradient(120% 80% at 50% 0,#2c4660,#0e1924 72%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px}
#intro .big{width:96px;height:96px;border-radius:50%;background:linear-gradient(150deg,var(--gold),#fff5d6);display:flex;align-items:center;justify-content:center;font-size:50px;box-shadow:0 0 0 6px rgba(184,149,42,.18),0 12px 40px rgba(184,149,42,.5);margin-bottom:18px;animation:breathe 2.4s infinite}
#intro .kick{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gold-2);margin-bottom:10px}
#intro h1{font-size:24px;font-weight:800;line-height:1.2;margin-bottom:9px}
#intro h1 b{color:var(--gold-2)}
#intro p{color:#aebccb;font-size:13.5px;max-width:285px;line-height:1.5;margin-bottom:22px}
#intro .start{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#15202B;border:none;border-radius:14px;padding:15px 30px;font-weight:800;font-size:16px;cursor:pointer;box-shadow:0 12px 34px rgba(184,149,42,.5)}
#intro .small{font-size:11px;color:#7d92a5;margin-top:16px}

/* session card */
.sescard{flex:1;display:flex;flex-direction:column;justify-content:center;padding:30px 26px;color:#fff;position:relative}
.sescard .no{font-size:60px;font-weight:900;line-height:.9;color:transparent;-webkit-text-stroke:1.5px rgba(184,149,42,.55);letter-spacing:-2px}
.sescard .gl{width:42px;height:4px;background:linear-gradient(90deg,var(--gold),var(--gold-2));border-radius:3px;margin:16px 0 13px}
.sescard h2{font-size:25px;font-weight:800;line-height:1.15;letter-spacing:-.3px}
.sescard p{color:#9fb4c6;font-size:13.5px;line-height:1.5;margin-top:9px;max-width:240px}
.sescard .badge{position:absolute;top:20px;right:20px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:#e7c976;border:1px solid rgba(184,149,42,.4);background:rgba(184,149,42,.14);padding:4px 10px;border-radius:999px}

.kpi{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.kpi .k{background:#fff;border:1px solid var(--g-borde);border-radius:14px;padding:11px;box-shadow:0 1px 2px rgba(20,30,45,.04)}
.kpi .k .v{font-size:19px;font-weight:800;color:var(--navy)}
.kpi .k .l{font-size:10.5px;color:var(--g);font-weight:600}
.bars{display:flex;align-items:flex-end;gap:7px;height:70px;margin-top:6px}
.bars i{flex:1;background:linear-gradient(var(--gold),#e7c976);border-radius:5px 5px 0 0;min-height:8px}
.dot-line{display:flex;gap:7px;margin:11px 0;justify-content:center}
.dot-line .pd{width:14px;height:14px;border-radius:50%;border:2px solid #9fb4c6;transition:.15s}
.dot-line .pd.f{background:var(--gold);border-color:var(--gold);transform:scale(1.12)}
.keys{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.keys button{background:#fff;border:1px solid var(--g-borde);border-radius:11px;padding:11px 0;font-size:17px;font-weight:700;color:var(--navy)}
.fld{background:#fff;border:1.5px solid var(--g-borde);border-radius:11px;padding:11px 12px;font-size:13px;color:var(--g-med);margin-bottom:6px}
.mic{width:84px;height:84px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-2));display:flex;align-items:center;justify-content:center;font-size:33px;margin:6px auto;box-shadow:0 0 0 8px rgba(184,149,42,.13),0 10px 28px rgba(184,149,42,.4)}
.seg{display:flex;gap:6px;flex-wrap:wrap}
.seg b{background:#fff;border:1px solid var(--g-borde);border-radius:9px;padding:8px 10px;font-size:11.5px;font-weight:700;color:var(--g-med)}
.seg b.on{background:var(--gold-soft);border-color:#ecd9a0;color:#7a611a}
.toast{position:absolute;left:12px;right:12px;bottom:12px;background:var(--wa);color:#fff;border-radius:13px;padding:11px 13px;font-size:12.5px;font-weight:700;box-shadow:0 12px 30px rgba(0,0,0,.32);display:flex;gap:8px;align-items:center;animation:slideup .45s ease}
@keyframes slideup{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.prog{height:8px;background:var(--g-fondo);border-radius:5px;overflow:hidden;margin-top:6px}
.prog i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#e7c976)}
.timeline{display:flex;align-items:center;gap:4px;margin:10px 0}
.timeline .st{flex:1;text-align:center;font-size:9px;font-weight:700;color:var(--g)}
.timeline .dotp{width:13px;height:13px;border-radius:50%;background:var(--g-borde);margin:0 auto 4px}
.timeline .st.on .dotp{background:var(--gold)}
.timeline .st.on{color:var(--gold)}
.trust{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.trust span{font-size:10.5px;font-weight:700;color:#cfe0ee;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:5px 9px}
.impact{flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 22px;color:#fff}
.impact .kick{font-size:10.5px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#d9b24e;margin-bottom:11px}
.impact .lead{font-size:14.5px;color:#cdd9e4;font-weight:600;line-height:1.4}
.bignum{font-size:44px;font-weight:900;color:#fff;letter-spacing:-1px;line-height:1;margin:7px 0 3px}
.bignum.gold{color:#e7c976}
.impact .unit{font-size:13px;color:#9fb4c6;font-weight:700}
.cmp{display:flex;gap:10px;margin-top:14px}
.cmp .c{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:13px;padding:11px}
.cmp .cl{font-size:11px;color:#9fb4c6;font-weight:700;margin-bottom:7px}
.cmp .track{height:8px;background:rgba(255,255,255,.12);border-radius:5px;overflow:hidden}
.cmp .track i{display:block;height:100%;width:0;border-radius:5px}
.brk{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.brk span{font-size:12px;font-weight:700;color:#e6edf3;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:6px 11px}
.fnote{font-size:10px;color:#7d92a5;margin-top:13px;line-height:1.45}
@media(max-height:720px){.phone{max-height:560px}.bubble{font-size:13.5px}.bignum{font-size:38px}}
</style>
</head>
<body>
<div id="amb"></div>
<div id="stage">
  <div class="jbar">
    <div class="javatar" id="jav">🤖</div>
    <div class="jmeta">
      <div class="jname"><b>Jarvis</b> · tu guía</div>
      <div class="jstate"><span id="jstate">listo</span>
        <span class="wave" id="wave"><span></span><span></span><span></span><span></span><span></span></span>
      </div>
    </div>
    <button class="jmute" id="mute" title="Silenciar voz">🔊</button>
  </div>
  <div class="bubble empty" id="bubble"></div>
  <div class="phonewrap">
    <div class="phone">
      <div class="statusbar"><span class="t">9:41</span><div class="island"></div><span class="ic">5G ▦ 100%</span></div>
      <div class="scr" id="scr"></div>
      <div id="intro">
        <div class="big">🤖</div>
        <div class="kick">Sistema de gestión · JAO</div>
        <h1>Hola, soy <b>Jarvis</b>.<br>Os enseño vuestra app.</h1>
        <p>Un recorrido en voz: primero la obra, luego la oficina. Yo lo guío todo — tú solo toca cuando te lo pida.</p>
        <button class="start" id="startBtn">▶ Empezar el recorrido</button>
        <div class="small">Con sonido · ~3 min · hecho a medida</div>
      </div>
    </div>
  </div>
  <div class="ctrls">
    <button class="restart" id="restart" title="Reiniciar">↺</button>
    <div class="pwrap"><div class="plabel"><b id="psession">Bienvenida</b><span id="pcount">0 / 0</span></div><div class="pbar"><i id="pfill"></i></div></div>
    <button class="next" id="next">Siguiente ▸</button>
  </div>
</div>

function talking(on){ jav.classList.toggle('talk',on); wave.classList.toggle('on',on); jstate.textContent=on?'hablando…':'listo'; }
function speak(text, cb){
  var plain=(text||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
  if(muted||!('speechSynthesis' in window)){ talking(true); var ms=Math.min(8500,1200+plain.length*46); return setTimeout(function(){talking(false); cb&&cb();},ms); }
  try{ speechSynthesis.cancel(); }catch(e){}
  var u=new SpeechSynthesisUtterance(plain);
  if(voice){u.voice=voice;u.lang=voice.lang;} else {u.lang='es-ES';}
  u.rate=0.88; u.pitch=1.05; u.volume=1;
  var done=false; var fin=function(){ if(done)return; done=true; clearTimeout(g); talking(false); cb&&cb(); };
  u.onstart=function(){talking(true);}; u.onend=fin; u.onerror=fin;
  var g=setTimeout(fin, Math.min(15000,1800+plain.length*78));
  speechSynthesis.speak(u);
}
/* ===== VOZ PRE-GRABADA (Ximena) con respaldo al navegador ===== */
var voxEl=new Audio(); voxEl.preload='auto';
function playLine(idx, text, cb){
  if(muted){ talking(true); var ms=Math.min(9000,1200+(text||'').replace(/<[^>]+>/g,'').length*46); return setTimeout(function(){talking(false); cb&&cb();},ms); }
  var done=false;
  var fin=function(){ if(done)return; done=true; voxEl.onended=null; voxEl.onerror=null; talking(false); cb&&cb(); };
  var fallback=function(){ if(done)return; done=true; voxEl.onended=null; voxEl.onerror=null; speak(text, cb); };
  try{ speechSynthesis.cancel(); }catch(e){}
  voxEl.onplaying=function(){ talking(true); };
  voxEl.onended=fin;
  voxEl.onerror=fallback;
  try{
    voxEl.src='voz/'+idx+'.mp3'; voxEl.currentTime=0;
    var p=voxEl.play();
    if(p&&p.catch) p.catch(function(){ fallback(); });
  }catch(e){ fallback(); }
}
document.getElementById('mute').onclick=function(){ muted=!muted; this.textContent=muted?'🔇':'🔊'; if(muted){try{speechSynthesis.cancel();}catch(e){} try{voxEl.pause();}catch(e){} talking(false);} };

/* ===== MOTOR ===== */
(function(){ var n=0; SCENES.forEach(function(sc){ sc.steps.forEach(function(st){ st.aud=n++; }); }); })();
var scr=document.getElementById('scr'), nextBtn=document.getElementById('next');
var pfill=document.getElementById('pfill'), pcount=document.getElementById('pcount'), psession=document.getElementById('psession');
var si=0, ti=0, timer=null;
function updateProg(){ var pct=Math.round(((si+1)/SCENES.length)*100); pfill.style.width=pct+'%'; pcount.textContent=(si+1)+' / '+SCENES.length; psession.textContent=SCENES[si].ses||'Recorrido'; }
function clearTimer(){ if(timer){clearTimeout(timer);timer=null;} }
function fmtNum(n){ return n.toLocaleString('es-ES'); }
function easeOut(p){ return 1-Math.pow(1-p,3); }
function animateStats(){
  scr.querySelectorAll('.count').forEach(function(el){
    var to=parseFloat(el.getAttribute('data-to'))||0, suf=el.getAttribute('data-suf')||'', steps=32, i=0;
    el.textContent='0'+suf;
    var iv=setInterval(function(){ i++; var p=i/steps; el.textContent=fmtNum(Math.floor(to*easeOut(p)))+suf; if(i>=steps){ el.textContent=fmtNum(to)+suf; clearInterval(iv); } },38);
    setTimeout(function(){ el.textContent=fmtNum(to)+suf; clearInterval(iv); },1600);
  });
  scr.querySelectorAll('.growbar').forEach(function(el){ var w=el.getAttribute('data-w'); el.style.width='0%'; setTimeout(function(){ el.style.transition='width 1.2s cubic-bezier(.22,.61,.36,1)'; el.style.width=w; },70); });
}
function clearHot(){ var a=scr.querySelector('.armed'); if(a){a.classList.remove('armed'); a.onclick=null;} var h=document.getElementById('taphint'); if(h)h.remove(); }
function armHot(sel,hint){
  var el=scr.querySelector(sel); if(!el) return;
  el.classList.add('armed'); el.style.position=el.style.position||'relative';
  var t=document.createElement('div'); t.className='taphint'; t.id='taphint'; t.textContent='👆 '+(hint||'Toca'); el.appendChild(t);
  el.onclick=function(e){ if(e)e.stopPropagation(); clearTimer(); clearHot(); goNext(); };
}
function pinEnter(done){
  var dots=scr.querySelectorAll('#pins .pd'), i=0;
  var iv=setInterval(function(){
    if(i<dots.length){ dots[i].classList.add('f'); i++; }
    else { clearInterval(iv); var b=scr.querySelector('#hsLogin');
      if(b){ b.classList.add('armed'); setTimeout(function(){ b.textContent='Entrando…'; setTimeout(function(){done&&done();},700); },320); }
      else done&&done(); }
  },210);
}
function renderScene(){
  var sc=SCENES[si];
  scr.className='scr fade'+((sc.navy||sc.raw)?' navy':'');
  scr.innerHTML=sc.screen;
  if(sc.toast){ var t=document.createElement('div'); t.className='toast'; t.id='scn-toast'; t.style.display='none'; t.innerHTML='<b>🟢</b> '+sc.toast; scr.appendChild(t); }
  animateStats();
  ti=0; updateProg(); runStep();
}
function runStep(){
  var sc=SCENES[si], st=sc.steps[ti];
  clearHot(); clearTimer();
  say(st.say, st.adv); nextBtn.disabled=false;
  if(st.toast){ var tt=scr.querySelector('#scn-toast'); if(tt) setTimeout(function(){tt.style.display='flex';},700); }
  playLine(st.aud, st.say, function(){
    if(st.hot){ armHot(st.hot, st.hint); timer=setTimeout(goNext, 7000); }
    else if(st.pin){ pinEnter(goNext); }
    else if(st.reveal){ var e=scr.querySelector(st.reveal); if(e)e.style.display='block'; timer=setTimeout(goNext, 1100); }
    else { timer=setTimeout(goNext, 1250); }
  });
}
function goNext(){
  clearTimer();
  var sc=SCENES[si];
  if(ti < sc.steps.length-1){ ti++; runStep(); }
  else if(si < SCENES.length-1){ si++; renderScene(); }
  else finish();
}
function finish(){ nextBtn.textContent='Reiniciar ↺'; jstate.textContent='fin'; }
nextBtn.onclick=function(){
  if(si===SCENES.length-1 && ti===SCENES[si].steps.length-1){ restart(); return; }
  try{speechSynthesis.cancel();}catch(e){} try{voxEl.pause();}catch(e){} talking(false); goNext();
};
function restart(){ clearTimer(); si=0; ti=0; nextBtn.textContent='Siguiente ▸'; bubble.classList.add('empty'); document.getElementById('intro').style.display='flex'; try{speechSynthesis.cancel();}catch(e){} try{voxEl.pause();}catch(e){} talking(false); }
document.getElementById('restart').onclick=restart;
document.getElementById('startBtn').onclick=function(){
  document.getElementById('intro').style.display='none';
  if(!muted){ try{ speechSynthesis.speak(new SpeechSynthesisUtterance(' ')); }catch(e){} }
  si=0; renderScene();
};
updateProg();
</script>
